<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: visible;
        background: transparent;
      }
      #pet-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #pet {
        width: 100%;
        height: 100%;
      }
      /* SVG overlay for speech text — same layer as pet, uses ZZZ-style float */
      #speech-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #speech-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 7px;
        font-weight: 600;
        fill: #555;
        opacity: 0;
      }
      #speech-text.visible {
        animation: speech-float 3.5s ease-out forwards;
      }
      @keyframes speech-float {
        0% {
          opacity: 0;
          transform: translate(0, 0) scale(0.7);
        }
        10% {
          opacity: 1;
          transform: translate(-2px, -4px) scale(0.85);
        }
        60% {
          opacity: 0.9;
          transform: translate(-4px, -14px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-6px, -22px) scale(0.9);
        }
      }
    </style>
  </head>
  <body>
    <div id="pet-container">
      <!-- SVG overlay for floating speech text (ZZZ-style) -->
      <svg id="speech-overlay" viewBox="-18 -18 58 58" xmlns="http://www.w3.org/2000/svg">
        <text id="speech-text" x="14" y="4" text-anchor="start"></text>
      </svg>
      <object id="pet" type="image/svg+xml" data="../pet-states/idle.svg"></object>
    </div>
    <script type="module" src="./petRenderer.ts"></script>
  </body>
</html>
