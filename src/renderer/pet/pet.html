<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: visible;
        background: transparent;
      }
      #pet-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #pet {
        width: 100%;
        height: 100%;
      }
      #speech-bubble {
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%) translateY(-100%);
        background: rgba(255, 255, 255, 0.96);
        color: #333;
        font-size: 10px;
        line-height: 1.3;
        padding: 4px 8px;
        border-radius: 8px;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(100, 100, 200, 0.2);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        z-index: 100;
      }
      #speech-bubble::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
        border-top: 5px solid rgba(255, 255, 255, 0.96);
      }
      #speech-bubble.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="pet-container">
      <div id="speech-bubble"></div>
      <object id="pet" type="image/svg+xml" data="../pet-states/idle.svg"></object>
    </div>
    <script type="module" src="./petRenderer.ts"></script>
  </body>
</html>
