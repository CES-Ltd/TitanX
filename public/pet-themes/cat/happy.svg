<svg viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .idle-body {
        transform-origin: 11px 18px;
        animation: idle-breathe 3.2s ease-in-out infinite, idle-sway 6s ease-in-out infinite;
        animation: happy-bounce 0.5s ease infinite;
      }
      .idle-eye {
        transform-origin: 11px 11px;
        animation: idle-blink 4s ease-in-out infinite;
      }
      .idle-shadow {
        transform-origin: 11px 22.5px;
        animation: idle-shadow-pulse 3.2s ease-in-out infinite;
      }
      .think-bubble { animation: think-bubble-float 3s ease-in-out infinite; }
      .zzz text { animation: zzz-float 2s ease-in-out infinite; }
      @keyframes idle-breathe {
        0%,100% { transform: scaleY(1) translateY(0); }
        50%     { transform: scaleY(0.97) translateY(0.3px); }
      }
      @keyframes idle-sway {
        0%,100% { transform: rotate(0deg); }
        25%     { transform: rotate(1.2deg); }
        75%     { transform: rotate(-1.2deg); }
      }
      @keyframes idle-blink {
        0%,8%,100% { transform: scaleY(1); }
        4%          { transform: scaleY(0.08); }
      }
      @keyframes idle-shadow-pulse {
        0%,100% { transform: scaleX(1); opacity: 0.35; }
        50%     { transform: scaleX(0.96); opacity: 0.28; }
      }
      @keyframes wk-bob {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-1.5px); }
      }
      @keyframes happy-bounce {
        0%,100% { transform: translateY(0) rotate(0); }
        50%     { transform: translateY(-3px) rotate(3deg); }
      }
      @keyframes think-bubble-float {
        0%,100% { transform: translateY(0); opacity: 0.8; }
        50%     { transform: translateY(-2px); opacity: 1; }
      }
      @keyframes zzz-float {
        0%,100% { transform: translateY(0); opacity: 0.3; }
        50%     { transform: translateY(-3px); opacity: 0.8; }
      }
    </style>
  </defs>
  <ellipse class="idle-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
  <g class="idle-body">
    <!-- ears --><polygon points="6,3 5,8 9,7" fill="#E8914A"/><polygon points="16,3 17,8 13,7" fill="#E8914A"/><polygon points="6.5,3.5 5.5,7.5 8.5,6.8" fill="#FFB5C0"/><polygon points="15.5,3.5 16.5,7.5 13.5,6.8" fill="#FFB5C0"/><!-- whiskers --><line x1="2" y1="12" x2="7" y2="11" stroke="#C0C0C0" stroke-width="0.3"/><line x1="2" y1="13" x2="7" y2="13" stroke="#C0C0C0" stroke-width="0.3"/><line x1="15" y1="11" x2="20" y2="12" stroke="#C0C0C0" stroke-width="0.3"/><line x1="15" y1="13" x2="20" y2="13" stroke="#C0C0C0" stroke-width="0.3"/><!-- nose --><ellipse cx="11" cy="12.5" rx="1" ry="0.7" fill="#FFB5C0"/>
    <rect x="5" y="6" width="12" height="12" rx="6" fill="#E8914A"/>
    <g class="idle-eye">
      <rect x="9" y="10" width="2" height="2" fill="#2D5016"/>
      <rect x="12" y="10" width="2" height="2" fill="#2D5016"/>
    </g>
    <path d="M9 14 Q11 16 13 14" stroke="#2D5016" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  </g>
  
</svg>
